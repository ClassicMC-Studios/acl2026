    <title>Moss Test Game</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        body{
            background-color: black;
        }
        #myCanvas{
            position: absolute;
            image-rendering:crisp-edges;
            width:auto;
            left:50%;
            transform: translate(-50%);
            height: 100%;
            z-index:1000;
        }
        img{
            display: none;
        }
    </style>

    -->
    <img src="./images/bg.PNG" id="bg"/>

    <img src="./images/drain.png" width="250px" height="350px" id="drain"/>
    <img src="./images/ln.png" width="250px" height="350px" id="ln"/>
    <img src="./images/genmat.png" width="250px" height="350px" id="genmat"/>
    <img src="./images/transform.png" width="250px" height="350px" id="transform"/>
    <img src="./images/dog.png" width="250px" height="350px" id="dog"/>
    <img src="./images/gato.png" width="250px" height="350px" id="gato"/>
    <img src="./images/galinha.PNG" width="250px" height="350px" id="galinha"/>

    -->

    <script src="./enemies.js"></script>
    <script src="./main.js"></script>
